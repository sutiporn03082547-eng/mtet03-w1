  body {
    font-family: 'Sarabun', 'Tahoma', sans-serif;
    background: #f2f4f7;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    justify-content: center;

  .card {
    background: #ffffff;
    max-width: 480px;
    width: 100%;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);

  }
  .card img {
    width: 150px;

    border: 4px solid #2c5eb5;
    margin-bottom: 16px;
  }

    margin: 0 0 4px 0;
    font-size: 24px;
    color: #1f2d3d;
  }
  p.role {
    margin: 0 0 20px 0;
    color: #667085;
    font-size: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    text-align: left;
    margin-bottom: 20px;
  }
  table td {
    padding: 8px 4px;
    border-bottom: 1px solid #eee;
    font-size: 14px;
  }
  table td:first-child {
    font-weight: 600;
    color: #344054;
    width: 35%;
  }
  .link-btn {
    display: inline-block;
    background: #2c5eb5;
    color: #fff;
    text-decoration: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    margin-top: 4px;
  }
  .link-btn:hover {
    background: #1f4489;
  }
</style>
